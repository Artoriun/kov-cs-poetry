name: Deploy to GitHub Pages

on:
  push:
    branches: 'main'
  workflow_dispatch:
    
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # Deploy runs on main (the only branch the github-pages environment allows),
      # but builds the Hungarian branch so Pages serves the Hungarian version.
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main-hungarian
          fetch-depth: 0

      # Pushing main and pushing main-hungarian are two separate events, so this job
      # can start before main-hungarian has been merged — publishing a stale build.
      # Wait for it to catch up to the commit that triggered us, then build that.
      # Skipped for workflow_dispatch so a manual run can always deploy as-is.
      - name: Wait for main-hungarian to contain main
        if: github.event_name == 'push'
        run: |
          for i in $(seq 1 20); do
            # Explicit refspec so the remote-tracking ref is definitely updated.
            git fetch --no-tags -q origin \
              '+refs/heads/main-hungarian:refs/remotes/origin/main-hungarian' || true
            # Errors (e.g. GITHUB_SHA not fetched yet) count as "not ready" and retry.
            if git merge-base --is-ancestor "$GITHUB_SHA" origin/main-hungarian 2>/dev/null; then
              git checkout -q -B main-hungarian origin/main-hungarian
              echo "Building main-hungarian at $(git log -1 --format='%h %s')"
              exit 0
            fi
            echo "main-hungarian does not contain ${GITHUB_SHA:0:7} yet; retrying in 15s ($i/20)"
            sleep 15
          done
          echo "::error::main-hungarian never caught up to main@${GITHUB_SHA:0:7}. Merge main into main-hungarian, then re-run this workflow."
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build All Packages
        run: npx turbo run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Copy index.html to 404.html for SPA routing
        run: cp packages/web/dist/index.html packages/web/dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'packages/web/dist' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4